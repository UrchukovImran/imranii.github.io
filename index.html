<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
       body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        min-height: 100vh;
        background: radial-gradient(circle, #e2e8f0 0%, #cbd5e1 100%);
        color: #535b64;
        cursor: default;
    }

    .form-title {
        text-align: center;
        margin-bottom: 0;
        font-size: 25px;
    }

    .form-instruction {
        text-align: center;
        margin-top: 2px;
        margin-bottom: 0;
    }

    .main-div {
        border: 1px solid #8b98a8;
        width: 350px;
        margin: 0 auto;
        background-color: rgba(245, 245, 245, 0.082);
    }
    

    hr {
        border: 1px solid #8b98a8;
        width: 50%;
        margin-bottom: 40px;
    }

    input {
        border: none;
        display: block;
        margin: 20px auto;
        padding: 10px;
        width: 250px;
        border-radius: 3px;
        margin-top: 0;
    }

    label {
        display: block;
        margin-left: 45px;
        width: 250px;
        margin-bottom: 7px;
        
    }

    input:focus, select:focus {
            outline-color: #8b98a8;
        }

    select {
        border: none;
        display: block;
        margin: 20px auto;
        padding: 10px;
        width: 270px;
        border-radius: 3px;
        
    }
    
    select, input {
                
                box-shadow: 0px 5px 30px rgba(128, 128, 128, 0.658);
                transition: all 0.2s;
    }

    select:hover, input:hover {
        padding-top: 12px;
        padding-bottom: 12px;
        padding-right: 20px;
        padding-left: 20px;
        box-shadow: 0px 5px 30px rgba(128, 128, 128, 0.863);
        transition: all 0.2s;
    }

    .submit-button {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        border: 1px solid #8b98a8;
        display: block;
        font-weight: bold;
    }

    .submit-button:hover {
        color: white;
        background-color: #8b98a8;
        border: 1px solid white;
    }

    </style>
</head>
<body>
    <main>
        <div class="main-div">
            <form action="https://formspree.io/f/mnqvkwqj" method="POST">
                    <h1 class="form-title">Welcome to our form page!</h1>
        <p class="form-instruction">Please fill out the form below:</p>
        <hr style="margin-bottom: 30px; margin-top: 30px;">
            <label style="margin-top: 0;" for="name">Name:</label>
            <input type="text" id="name"   placeholder="Enter Your Name">
            <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" placeholder="Enter Your Last Name">
            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="Enter Your Email">
            <label for="age">Age:</label>
            <input type="number" id="age" max="99" min="16" placeholder="Enter Your Age">
            <label for="gender">Gender:</label>
            <select id="gender" style="margin-top: 0; margin-bottom: 30px;">
                <option value="gender" disabled selected>Select Your Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="prefer">Prefer not to say</option>
            </select>
            <hr style="margin-bottom: 30px; margin-top: 0;">
            <input class="submit-button" type="submit" value="Submit" onclick="event.preventDefault(); alert('Эта часть в  разработке 🛠️\n\nThis part is under development 🛠️');" />
        </form>
        </div>
    </main>
</body>
</html>
